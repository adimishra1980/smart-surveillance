services:
  surveillance-db:
    image: postgres:15
    container_name: surveillance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: surveillance
    ports:
      - "5432:5432"
    volumes:
      - surveillance-db-data:/var/lib/postgresql/data

volumes:
  surveillance-db-data:
